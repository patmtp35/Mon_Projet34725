      if (!isnan(vd)) return vd;
      return id(mppt1_max_power_today);

  # ════════════════════════════════════════
  # MPPT2 — unified templates (BLE priority)
  # ════════════════════════════════════════

  - platform: template
    name: "${mppt2_name}_esp_battery_voltage"
    id: mppt2_esp_batt_voltage
