#############################################
### INTERVALS
#############################################

interval:

  # ── Battery proxy → Venus OS ──
  - interval: ${battery_publish_interval}
    then:
      - if:
          condition:
            lambda: return !id(battery_topic_w).empty();
          then:
            - mqtt.publish:
                topic: device/${venus_mqtt_client_id}/Proxy
                qos: 0
                retain: false
                payload: !lambda |-
                  DynamicJsonDocument doc(${json_doc_size});
                  doc["topicPath"] = id(battery_topic_w);
                  JsonObject v = doc["values"].to<JsonObject>();

                  float vb = id(shunt_battery_voltage).state;
                  if (!isnan(vb)) {
                    if (vb < id(batt_min_voltage_today)) id(batt_min_voltage_today) = vb;
                    if (vb > id(batt_max_voltage_today)) id(batt_max_voltage_today) = vb;
                    v["Dc/0/Voltage"] = vb;
                  }

                  float ib = id(shunt_battery_current).state;
                  if (!isnan(ib)) v["Dc/0/Current"] = ib;

                  float pw = id(shunt_vd_power).state;
                  if (!isnan(pw))
                    v["Dc/0/Power"] = pw;
                  else {
                    float p2 = id(shunt_battery_power).state;
                    if (!isnan(p2)) v["Dc/0/Power"] = p2;
                  }

                  float soc = id(shunt_soc).state;
                  if (!isnan(soc)) v["Soc"] = soc;

                  float cah = id(shunt_vd_consumed_ah).state;
                  if (!isnan(cah)) v["ConsumedAh"] = cah;

                  v["InstalledCapacity"] = ${battery_capacity_ah};

                  if (id(batt_min_voltage_today) < 1000.0)
                    v["History/Daily/0/MinVoltage"] = id(batt_min_voltage_today);
                  if (id(batt_max_voltage_today) > 0.0)
                    v["History/Daily/0/MaxVoltage"] = id(batt_max_voltage_today);

                  float ttg = id(shunt_vd_time_to_go).state;
                  if (!isnan(ttg) && ttg > 0)
                    v["TimeToGo"] = (int) ttg;

                  std::string out;
                  serializeJson(doc, out);
                  return out;

  # ── GX keepalive ──
  - interval: ${venus_keepalive_interval}
    then:
      - if:
          condition:
            lambda: return !id(venus_portal_id_str).empty();
          then:
            - mqtt.publish:
                topic: !lambda |-
                  return std::string("R/") + id(venus_portal_id_str) + "/keepalive";
                payload: ""
                qos: 0
                retain: false

  # ── Status heartbeat ──
  - interval: ${status_interval}
    then:
      - mqtt.publish:
          topic: device/${venus_mqtt_client_id}/Status
          qos: 0
          retain: true
          payload: |
            {"clientId":"${venus_mqtt_client_id}","connected":1,"version":"${venus_app_version}","services":{"${shunt_service_name}":"battery"}}

  # ── Charge timers (1 min tick) ──
  - interval: ${interval_timer}
    then:
      - lambda: |-
          int m1 = (int) id(mppt1_vd_charging_mode_id).state;
          if (m1 == 3) id(mppt1_time_bulk)++;
          if (m1 == 4) id(mppt1_time_abs)++;
          if (m1 == 5) id(mppt1_time_float)++;

          int m2 = (int) id(mppt2_vd_charging_mode_id).state;
          if (m2 == 3) id(mppt2_time_bulk)++;
          if (m2 == 4) id(mppt2_time_abs)++;
          if (m2 == 5) id(mppt2_time_float)++;

  # ── MPPT1 → Venus OS ──
  - interval: ${mppt_publish_interval}
    then:
      - mqtt.publish:
          topic: ${mppt1_venus_topic}
          retain: true
          payload: !lambda |-
            DynamicJsonDocument doc(${json_doc_size});

            float pwr = id(mppt1_vd_pv_power).state;
            if (isnan(pwr)) pwr = id(mppt1_ble_pv_power).state;
            if (isnan(pwr)) pwr = 0;

            float pv_v = id(mppt1_vd_pv_voltage).state;
            if (isnan(pv_v)) pv_v = id(mppt1_ble_pv_voltage).state;
            if (isnan(pv_v)) pv_v = 0;
            if (pv_v > 5 && pv_v > id(mppt1_max_pv_voltage_today))
              id(mppt1_max_pv_voltage_today) = pv_v;

            float bv = id(mppt1_vd_batt_voltage).state;
            if (isnan(bv)) bv = id(shunt_battery_voltage).state;

            float bi = id(mppt1_vd_batt_current).state;
            if (isnan(bi)) bi = 0;

            int state = 1;
            if (!isnan(id(mppt1_vd_charging_mode_id).state)) {
              int m = (int) id(mppt1_vd_charging_mode_id).state;
              if (m >= 3 && m <= 7) state = m;
            }

            doc["Pv"]["V"] = pv_v;
            doc["Yield"]["Power"] = pwr;

            // yield_total from VE.Direct is in Wh → divide by 1000 for kWh
            float total = id(mppt1_vd_yield_total).state;
            if (!isnan(total) && total > 0)
              doc["Yield"]["System"] = total / 1000.0f;
            else if (id(mppt1_yield_lifetime_kwh) > 0)
              doc["Yield"]["System"] = id(mppt1_yield_lifetime_kwh);
            else
              doc["Yield"]["System"] = 0;

            doc["Dc"]["0"]["Voltage"] = bv;
            doc["Dc"]["0"]["Current"] = bi;

            // History today (day 0)
            // yield_today from VE.Direct is in Wh → divide by 1000 for kWh
            float y = id(mppt1_vd_yield_today).state;
            doc["History"]["Daily"]["0"]["Yield"] = (!isnan(y))
              ? y / 1000.0f
              : id(mppt1_yield_today_wh) / 1000.0f;

            float maxp = id(mppt1_vd_max_power_today).state;
            doc["History"]["Daily"]["0"]["MaxPower"] = (!isnan(maxp)) ? maxp : id(mppt1_max_power_today);

            doc["History"]["Daily"]["0"]["MaxPvVoltage"]      = id(mppt1_max_pv_voltage_today);
            doc["History"]["Daily"]["0"]["MinBatteryVoltage"] = (id(batt_min_voltage_today) < 1000.0f) ? id(batt_min_voltage_today) : 0.0f;
            doc["History"]["Daily"]["0"]["MaxBatteryVoltage"] = id(batt_max_voltage_today);
            doc["History"]["Daily"]["0"]["TimeInBulk"]        = (int) id(mppt1_time_bulk);
            doc["History"]["Daily"]["0"]["TimeInAbsorption"]  = (int) id(mppt1_time_abs);
            doc["History"]["Daily"]["0"]["TimeInFloat"]       = (int) id(mppt1_time_float);
            doc["History"]["Daily"]["0"]["MaxBatteryCurrent"] = id(mppt1_max_batt_current_today);

            // History yesterday (day 1) — stored in kWh
            doc["History"]["Daily"]["1"]["Yield"]        = id(mppt1_yield_yesterday_kwh);
            doc["History"]["Daily"]["1"]["MaxPower"]     = id(mppt1_max_power_yesterday);
            doc["History"]["Daily"]["1"]["MaxPvVoltage"] = id(mppt1_max_pv_voltage_yesterday);

            doc["ErrorCode"]       = (int) id(mppt1_vd_error_code).state;
            doc["State"]           = state;
            doc["Mode"]            = 1;
            doc["MppOperationMode"]= 2;

            std::string out;
            serializeJson(doc, out);
            return out;

  # ── MPPT2 → Venus OS ──
  - interval: ${mppt_publish_interval}
    then:
      - mqtt.publish:
          topic: ${mppt2_venus_topic}
          retain: true
          payload: !lambda |-
            DynamicJsonDocument doc(${json_doc_size});

            float pwr = id(mppt2_vd_pv_power).state;
            if (isnan(pwr)) pwr = id(mppt2_ble_pv_power).state;
            if (isnan(pwr)) pwr = 0;

            float pv_v = id(mppt2_vd_pv_voltage).state;
            if (isnan(pv_v)) pv_v = id(mppt2_ble_pv_voltage).state;
            if (isnan(pv_v)) pv_v = 0;
            if (pv_v > 5 && pv_v > id(mppt2_max_pv_voltage_today))
              id(mppt2_max_pv_voltage_today) = pv_v;

            float bv = id(mppt2_vd_batt_voltage).state;
            if (isnan(bv)) bv = id(shunt_battery_voltage).state;

            float bi = id(mppt2_vd_batt_current).state;
            if (isnan(bi)) bi = 0;

            int state = 1;
            if (!isnan(id(mppt2_vd_charging_mode_id).state)) {
              int m = (int) id(mppt2_vd_charging_mode_id).state;
              if (m >= 3 && m <= 7) state = m;
            }

            doc["Pv"]["V"] = pv_v;
            doc["Yield"]["Power"] = pwr;

            float total = id(mppt2_vd_yield_total).state;
            if (!isnan(total) && total > 0)
              doc["Yield"]["System"] = total / 1000.0f;
            else if (id(mppt2_yield_lifetime_kwh) > 0)
              doc["Yield"]["System"] = id(mppt2_yield_lifetime_kwh);
            else
              doc["Yield"]["System"] = 0;

            doc["Dc"]["0"]["Voltage"] = bv;
            doc["Dc"]["0"]["Current"] = bi;

            float y = id(mppt2_vd_yield_today).state;
            doc["History"]["Daily"]["0"]["Yield"] = (!isnan(y))
              ? y / 1000.0f
              : id(mppt2_yield_today_wh) / 1000.0f;

            float maxp = id(mppt2_vd_max_power_today).state;
            doc["History"]["Daily"]["0"]["MaxPower"] = (!isnan(maxp)) ? maxp : id(mppt2_max_power_today);

            doc["History"]["Daily"]["0"]["MaxPvVoltage"]      = id(mppt2_max_pv_voltage_today);
            doc["History"]["Daily"]["0"]["MinBatteryVoltage"] = (id(batt_min_voltage_today) < 1000.0f) ? id(batt_min_voltage_today) : 0.0f;
            doc["History"]["Daily"]["0"]["MaxBatteryVoltage"] = id(batt_max_voltage_today);
            doc["History"]["Daily"]["0"]["TimeInBulk"]        = (int) id(mppt2_time_bulk);
            doc["History"]["Daily"]["0"]["TimeInAbsorption"]  = (int) id(mppt2_time_abs);
            doc["History"]["Daily"]["0"]["TimeInFloat"]       = (int) id(mppt2_time_float);
            doc["History"]["Daily"]["0"]["MaxBatteryCurrent"] = id(mppt2_max_batt_current_today);

            doc["History"]["Daily"]["1"]["Yield"]        = id(mppt2_yield_yesterday_kwh);
            doc["History"]["Daily"]["1"]["MaxPower"]     = id(mppt2_max_power_yesterday);
            doc["History"]["Daily"]["1"]["MaxPvVoltage"] = id(mppt2_max_pv_voltage_yesterday);

            doc["ErrorCode"]       = (int) id(mppt2_vd_error_code).state;
            doc["State"]           = state;
            doc["Mode"]            = 1;
            doc["MppOperationMode"]= 2;

            std::string out;
            serializeJson(doc, out);
            return out;
