    id: mppt10020_ble_panel_current
    name: "mppt10020_ble_panel_current"
    type: BATTERY_CURRENT

  - platform: victron_ble
    victron_ble_id: mppt10020_ble
    id: mppt10020_ble_panel_voltage
    name: "mppt10020_ble_panel_voltage"
    type: INPUT_VOLTAGE

  - platform: victron_ble
    victron_ble_id: mppt10020_ble
    id: mppt10020_ble_panel_power
