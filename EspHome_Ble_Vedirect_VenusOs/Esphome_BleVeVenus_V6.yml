    lambda: |-
      float i_ble = id(mppt10020_ble_panel_current).state;
      float i_vd  = id(mppt10020_vd_panel_current).state;

      if (!isnan(i_ble) && fabs(i_ble) > 0.01)
        return i_ble;
      if (!isnan(i_vd))
        return i_vd;
      return NAN;

  - platform: template
    name: "smartsolar1_esp_panel_voltage"
    id: smartsolar1_esp_panel_voltage
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      float v_ble = id(mppt10020_ble_panel_voltage).state;
      float v_vd  = id(mppt10020_vd_panel_voltage).state;

      float v = NAN;

      // Fallback inchangé : BLE prioritaire
      if (!isnan(v_ble) && v_ble > 5.0)
        v = v_ble;
      else if (!isnan(v_vd) && v_vd > 5.0)
        v = v_vd;

      // ✅ Mise à jour max PV voltage today (uniquement si valeur valide)
      if (!isnan(v) && v > id(mppt10020_max_pv_voltage_today))
        id(mppt10020_max_pv_voltage_today) = v;

      // Comportement original : retourne 0.0 si aucune source valide
      return isnan(v) ? 0.0f : v;

  - platform: template
