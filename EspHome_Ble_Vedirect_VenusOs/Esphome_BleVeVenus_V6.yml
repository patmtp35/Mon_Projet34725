# MPPT 100/20_2 → Venus OS (MR-MANUEL CLEAN)
##################################################################################
  - interval: 5s
    then:
      - mqtt.publish:
          topic: venus/solarcharger/mppt_100_20_2
          retain: true
          payload: !lambda |-

            DynamicJsonDocument doc(4096);

            float pwr = id(mppt10020_2_vd_panel_power).state;
            if (isnan(pwr))
              pwr = id(mppt10020_2_ble_panel_power).state;
            if (isnan(pwr)) pwr = 0;

            float bv = id(mppt10020_2_vd_battery_voltage).state;
            if (isnan(bv))
              bv = id(smartshunt500a_battery_voltage).state;

            float bi = id(mppt10020_2_vd_panel_current).state;
            if (isnan(bi)) bi = 0; 

            float pv_v = id(mppt10020_2_vd_panel_voltage).state;

            if (isnan(pv_v))
              pv_v = id(mppt10020_2_ble_panel_voltage).state;

            if (isnan(pv_v))
              pv_v = 0;

            // Track Max PV Voltage Today
            if (pv_v > 5 && pv_v > id(mppt10020_2_max_pv_voltage_today))
              id(mppt10020_2_max_pv_voltage_today) = pv_v;

            int state = 1;
            if (!isnan(id(mppt10020_2_vd_charging_mode_id).state)) {
              int m = (int) id(mppt10020_2_vd_charging_mode_id).state;
              if (m >= 3 && m <= 7) state = m;
            }

            JsonObject pv = doc["Pv"].to<JsonObject>();
            pv["V"] = pv_v;

            JsonObject yield = doc["Yield"].to<JsonObject>();
            yield["Power"] = pwr;
            yield["System"] = id(mppt10020_2_yield_lifetime);

            JsonObject dc0 = doc["Dc"]["0"].to<JsonObject>();
            dc0["Voltage"] = bv;
            dc0["Current"] = bi;

            JsonObject hist0 = doc["History"]["Daily"]["0"].to<JsonObject>();
            JsonObject hist1 = doc["History"]["Daily"]["1"].to<JsonObject>();

            // ── Aujourd'hui ──
            float y = id(mppt10020_2_vd_yield_today).state;
            if (!isnan(y))
              hist0["Yield"] = y;
            else
              hist0["Yield"] = id(mppt10020_2_yield_today_wh) / 1000.0;

            float maxp = id(mppt10020_2_vd_max_power_today).state;
            if (!isnan(maxp))
              hist0["MaxPower"] = maxp;
            else
              hist0["MaxPower"] = id(mppt10020_2_max_power_today);

            hist0["MaxPvVoltage"]      = id(mppt10020_2_max_pv_voltage_today);
            hist0["MinBatteryVoltage"] = id(battery_min_voltage_today) < 1000.0f ? id(battery_min_voltage_today) : 0.0f;
            hist0["MaxBatteryVoltage"] = id(battery_max_voltage_today);
            hist0["TimeInBulk"]        = (int) id(mppt10020_2_time_bulk);
            hist0["TimeInAbsorption"]  = (int) id(mppt10020_2_time_abs);
            hist0["TimeInFloat"]       = (int) id(mppt10020_2_time_float);
            hist0["MaxBatteryCurrent"] = id(mppt10020_2_max_battery_current_today);

            hist1["Yield"]        = id(mppt10020_2_yield_yesterday);
            hist1["MaxPower"]     = id(mppt10020_2_max_power_yesterday);
            hist1["MaxPvVoltage"] = id(mppt10020_2_max_pv_voltage_yesterday);

            doc["ErrorCode"] = (int) id(mppt10020_2_vd_error_code).state;
            doc["State"] = state;
            doc["Mode"] = 1;
            doc["MppOperationMode"] = 2;

            std::string out;
            serializeJson(doc, out);
            return out;                      