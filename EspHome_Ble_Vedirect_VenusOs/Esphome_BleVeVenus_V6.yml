    type: CHARGER_ERROR

  #################################################
  # SmartShunt 500A BLE
  #################################################

  - platform: victron_ble
    victron_ble_id: smartshunt500a_ble
    id: smartshunt500a_ble_battery_voltage
    name: "smartshunt500a_ble_battery_voltage"
    type: BATTERY_VOLTAGE

  - platform: victron_ble
    victron_ble_id: smartshunt500a_ble
    id: smartshunt500a_ble_battery_current
    name: "smartshunt500a_ble_battery_current"
    type: BATTERY_CURRENT

  - platform: victron_ble
    victron_ble_id: smartshunt500a_ble
    id: smartshunt500a_ble_battery_power
    name: "smartshunt500a_ble_battery_power"
    type: BATTERY_POWER

  - platform: victron_ble
    victron_ble_id: smartshunt500a_ble
    id: smartshunt500a_ble_soc
    name: "smartshunt500a_ble_soc"
    type: STATE_OF_CHARGE

#################################################
# SmartShunt 500A VE.Direct (étendu)
#################################################

  - platform: victron
    victron_id: smartshunt500a_vd
 
    battery_voltage:
      name: "smartshunt500a_vd_battery_voltage"
      id: smartshunt500a_vd_battery_voltage
      internal: true

    battery_current:
      name: "smartshunt500a_vd_battery_current"
      id: smartshunt500a_vd_battery_current
      internal: true

    instantaneous_power:
      name: "smartshunt500a_vd_power"
      id: smartshunt500a_vd_power
      internal: true

    battery_temperature:
      name: "smartshunt500a_vd_battery_temperature"
      internal: true

    time_to_go:
      name: "smartshunt500a_vd_time_to_go"
      id: smartshunt500a_vd_time_to_go
      unit_of_measurement: "min"
      internal: false   # 👈 exposé à Home Assistant

    state_of_charge:
      name: "smartshunt500a_vd_soc"
      id: smartshunt500a_vd_soc
      internal: true

    consumed_amp_hours:
      name: "smartshunt500a_vd_consumed_ah"
      id: smartshunt500a_vd_consumed_ah
      internal: true

    amount_of_discharged_energy:
      name: "smartshunt500a_vd_energy_discharged"
      unit_of_measurement: "kWh"
      internal: true

    amount_of_charged_energy:
      name: "smartshunt500a_vd_energy_charged"
      unit_of_measurement: "kWh"
      internal: true

    number_of_charge_cycles:
      name: "smartshunt500a_vd_charge_cycles"
      internal: true


  #################################################
  # MPPT 100/20 VE.Direct (avec id: ajoutés)
  #################################################
  - platform: victron
    victron_id: mppt10020_vd
    panel_voltage:
      name: "mppt10020_vd_panel_voltage"
      id: mppt10020_vd_panel_voltage
      
    panel_power:
      name: "mppt10020_vd_panel_power"
      id: mppt10020_vd_panel_power
      
    battery_voltage:
      name: "mppt10020_vd_battery_voltage"
      id: mppt10020_vd_battery_voltage
      
    battery_current:
      name: "mppt10020_vd_panel_current"
      id: mppt10020_vd_panel_current
      
    yield_today:
      name: "mppt10020_vd_yield_today"
      id: mppt10020_vd_yield_today
      on_value:
        then:
          - lambda: |-
              if (!isnan(x) && (x >= 0))
                id(mppt10020_yield_today_wh) = x * 1000.0f;
      
    yield_yesterday:
      name: "mppt10020_vd_yield_yesterday"
      id: mppt10020_vd_yield_yesterday
      
    yield_total:
      name: "mppt10020_vd_yield_total"
      id: mppt10020_vd_yield_total
      
    max_power_today:
      name: "mppt10020_vd_max_power_today"
      id: mppt10020_vd_max_power_today
      
    max_power_yesterday:
      name: "mppt10020_vd_max_power_yesterday"
      id: mppt10020_vd_max_power_yesterday
      
    day_number:
      name: "mppt10020_vd_day_number"
      id: mppt10020_vd_day_number
      
    error_code:
      name: "mppt10020_vd_error_code"
      id: mppt10020_vd_error_code
      
    charging_mode_id:
      name: "mppt10020_vd_charging_mode_id"
      id: mppt10020_vd_charging_mode_id
      
    tracking_mode_id:
      name: "mppt10020_vd_tracking_mode_id"
      id: mppt10020_vd_tracking_mode_id
      
    load_current:
      name: "mppt10020_vd_load_current"
      id: mppt10020_vd_load_current

  #################################################
  # MPPT 100/20_2 VE.Direct (inchangé)
  #################################################
  - platform: victron
    victron_id: mppt10020_2_vd
    panel_voltage:
      name: "mppt10020_2_vd_panel_voltage"
      id: mppt10020_2_vd_panel_voltage
    panel_power:
      name: "mppt10020_2_vd_panel_power"
      id: mppt10020_2_vd_panel_power
    battery_voltage:
      name: "mppt10020_2_vd_battery_voltage"
      id: mppt10020_2_vd_battery_voltage
    battery_current:
      name: "mppt10020_2_vd_panel_current"
      id: mppt10020_2_vd_panel_current
    yield_today:
      id: mppt10020_2_vd_yield_today
      name: "mppt10020_2_vd_yield_today"
      on_value:
        then:
          - lambda: |-
              if (!isnan(x) && (x >= 0))
                id(mppt10020_2_yield_today_wh) = x * 1000.0f;
    yield_yesterday:
      id: mppt10020_2_vd_yield_yesterday
      name: "mppt10020_2_vd_yield_yesterday"
    yield_total:
      id: mppt10020_2_vd_yield_total
      name: "mppt10020_2_vd_yield_total"
    max_power_today:
