  - platform: victron_ble
    victron_ble_id: mppt10020_2_ble
    id: mppt10020_2_ble_panel_power
    name: "mppt10020_2_ble_panel_power"
    type: PV_POWER

  - platform: victron_ble
    victron_ble_id: mppt10020_2_ble
    id: mppt10020_2_ble_battery_voltage
    name: "mppt10020_2_ble_battery_voltage"
    type: BATTERY_VOLTAGE

  - platform: victron_ble
    victron_ble_id: mppt10020_2_ble
    id: mppt10020_2_ble_panel_current
    name: "mppt10020_2_ble_panel_current"
    type: BATTERY_CURRENT

  - platform: victron_ble
    victron_ble_id: mppt10020_2_ble
    id: mppt10020_2_ble_load_current
