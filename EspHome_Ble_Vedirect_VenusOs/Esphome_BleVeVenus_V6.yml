#############################################
# V6.3 - Amelioration remonté Historique MPPT
# V6.2 - GX ESS amelioration
# V6.1 - Amelioration Mqtt VenusOs
# V6.0 - Rajout Venus Os Ready Via Mqtt
# V5.0 – Unified BLE + VE.Direct Redundant
# 1 smartshunt 500A
# 2 MPPT (100/20 + 100/20_2)
# Chaque MPPT +SmartShunt : BLE + VE.Direct + Mqtt
#############################################
# dependances pour que cela marche:
#  
# https://github.com/mr-manuel/venus-os_dbus-mqtt-solar-charger/tree/master
# CONFIG FILE
# 
# [DEFAULT]
# logging = WARNING
# ; Device name
# device_name = SmartSolar MPPT 100/20
# ; Device VRM instance
# device_instance = 20
# timeout = 30
# history_days = 14 #if not 14 bug
# [MQTT]
# broker_address = 127.0.0.1
# broker_port = 1883
# tls_enabled = 0
# username = xxx
# password = xxxxx
# topic = venus/solarcharger/mppt_100_20
#
# https://github.com/freakent/dbus-mqtt-devices/tree/v0.9.0dev
#
#####################################################################################
substitutions:
  name: "victron-unifiedvenus-esp"
  esphome_name: "VictronUnifiedVenus-Esp"
  friendly_name: "Victron Unified"
  
  # pour common.yaml
  sensor_prefix: "victron_unified"

  # sources externes
  external_components_source_ble: github://Fabian-Schmidt/esphome-victron_ble
  external_components_source_vedirect: github://KinDR007/VictronMPPT-ESPHOME@main

  device_description: "Victron BLE + VE.Direct Unified Interface VenusOs Ready"
  time_timezone: "Europe/Paris"
  projectname: "Pat.VictronUnifiedVenusReady"
  appversion: "6.2.0"

  log_level: "VERBOSE"
  baud_ratelog: "0"

  ota_pswd: !secret ota_pswd
  ap_pwd: !secret ota_pswd

  adress_ip: !secret ip_victron_unified
  gateway_ip: !secret ip_gateway
  dns_ip: !secret ip_dns

  time_id: ha_time
  time_platform: homeassistant
  
  # BLE MPPT 100/20
  smart_10020_mac_address: !secret mppt100_20_mac
  smart_10020_encryption_key: !secret mppt100_20_key

  # BLE MPPT 100/20_2
  smart_10020_2_mac_address: !secret mppt100_20_2mac
  smart_10020_2_encryption_key: !secret mppt100_20_2key

  # SmartShunt 500a
  smartshunt500a_mac_address: !secret smartshunt500a_mac
  smartshunt500a_encryption_key: !secret smartshunt500a_key
  battery_installed_capacity_ah: "150"

  api_encryption_key: !secret smartsolar2key
  
  venus_portal_id: !secret venus_portal_id
#############################################
### ESP32 definition
#############################################

esp32:
  board: esp32dev
  framework:
    type: esp-idf

#############################################
### COMMON CONFIG
#############################################

<<: !include .common.yaml

#############################################
### EXTERNAL COMPONENTS
#############################################

external_components:
  - source: ${external_components_source_ble}
    refresh: 0s
  - source: ${external_components_source_vedirect}
    refresh: 0s

#############################################
### TIMER
#############################################
time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - seconds: 0
        minutes: 0
        hours: 0
        then:
          - lambda: |-
              // ═══════════════════════════════════════
              // MPPT 100/20 — sauvegarde J-1 puis reset
              // ═══════════════════════════════════════

              // Yield yesterday (kWh)
              id(mppt10020_yield_yesterday) =
                id(mppt10020_yield_today_wh) / 1000.0f;

              // Lifetime cumulé
              id(mppt10020_yield_lifetime) +=
                id(mppt10020_yield_yesterday);

              // Sauvegarde max avant reset ✅
              id(mppt10020_max_power_yesterday)      = id(mppt10020_max_power_today);
              id(mppt10020_max_pv_voltage_yesterday) = id(mppt10020_max_pv_voltage_today);

              // Reset daily
              id(mppt10020_yield_today_wh)        = 0;
              id(mppt10020_max_power_today)       = 0;
              id(mppt10020_max_pv_voltage_today)  = 0;  // ✅ manquait avant
              id(mppt10020_time_bulk)             = 0;
              id(mppt10020_time_abs)              = 0;
              id(mppt10020_time_float)            = 0;
              id(mppt10020_last_state)            = 0;
              id(mppt10020_last_ts)               = 0;
              id(mppt10020_max_pv_voltage_today)  = 0;
              id(mppt10020_max_battery_current_today) = 0;

              // ═══════════════════════════════════════
              // MPPT 100/20_2 — sauvegarde J-1 puis reset
              // ═══════════════════════════════════════

              // Yield yesterday (kWh)
              id(mppt10020_2_yield_yesterday) =
                id(mppt10020_2_yield_today_wh) / 1000.0f;

              // Lifetime cumulé
              id(mppt10020_2_yield_lifetime) +=
                id(mppt10020_2_yield_yesterday);

              // Sauvegarde max avant reset ✅
              id(mppt10020_2_max_power_yesterday)      = id(mppt10020_2_max_power_today);
              id(mppt10020_2_max_pv_voltage_yesterday) = id(mppt10020_2_max_pv_voltage_today);

              // Reset daily
              id(mppt10020_2_yield_today_wh)       = 0;
              id(mppt10020_2_max_power_today)       = 0;
              id(mppt10020_2_max_pv_voltage_today)  = 0;  // ✅ manquait avant
              id(mppt10020_2_time_bulk)             = 0;
              id(mppt10020_2_time_abs)              = 0;
              id(mppt10020_2_time_float)            = 0;
              id(mppt10020_2_last_state)            = 0;
              id(mppt10020_2_last_ts)               = 0;
              id(mppt10020_2_max_pv_voltage_today)  = 0;
              id(mppt10020_2_max_battery_current_today) = 0;

              // ═══════════════════════════════════════
              // Battery min/max voltage — reset daily
              // ═══════════════════════════════════════
              id(battery_min_voltage_today) = 1000.0f;
              id(battery_max_voltage_today) = 0.0f;
#############################################
### MQTT DU VENUS OS
#############################################

mqtt:
  broker: !secret mqtt_venusos_host
  port: 1883
  username: !secret mqtt_venusos_user
  password: !secret mqtt_venusos_pswd
  discovery: false
  #log_topic: null
  client_id: victron_unified

  will_message:
    topic: device/victron_unified/Status
    payload: |-
      {
        "clientId": "victron_unified",
        "connected": 0,
        "services": {
          "battery1": "battery"
        }
      }

  on_connect:
    then:
      - mqtt.publish:
          topic: device/victron_unified/Status
          retain: true
          payload: |-
            {
              "clientId": "victron_unified",
              "connected": 1,
              "version": "6.2.0",
              "services": {
                "battery1": "battery"
              }
            }

  on_message:
    - topic: device/victron_unified/DBus
      then:
        - lambda: |-
            DynamicJsonDocument doc(6144);
            auto err = deserializeJson(doc, x);
            if (err) {
              ESP_LOGW("mqtt", "DBus JSON parse failed");
              return;
            }

            /* ---------- portalId ---------- */
            if (doc["portalId"].is<const char*>()) {
              id(venus_portal_id) = doc["portalId"].as<const char*>();
              ESP_LOGI("mqtt", "PortalId: %s", id(venus_portal_id).c_str());
            }

            /* ---------- topicPath ---------- */
            if (doc["topicPath"].is<JsonObject>()) {
              JsonObject tp = doc["topicPath"];

            if (tp["battery1"]["W"].is<const char*>()) {
                id(battery_topic_w) = tp["battery1"]["W"].as<const char*>();
                ESP_LOGI("mqtt", "Battery W topic: %s", id(battery_topic_w).c_str());
              }
            if (tp["solarcharger1"]["W"].is<const char*>()) {
              id(mppt10020_topic_w) = tp["solarcharger1"]["W"].as<const char*>();
            }
            if (tp["solarcharger2"]["W"].is<const char*>()) {
             id(mppt10020_2_topic_w) = tp["solarcharger2"]["W"].as<const char*>();
            }  
            }

#############################################
### BLE TRACKER + BLE DEVICES
#############################################

esp32_ble_tracker:

victron_ble:
  - id: mppt10020_ble
    mac_address: ${smart_10020_mac_address}
    bindkey: ${smart_10020_encryption_key}

  - id: mppt10020_2_ble
    mac_address: ${smart_10020_2_mac_address}
    bindkey: ${smart_10020_2_encryption_key}

  - id: smartshunt500a_ble
    mac_address: ${smartshunt500a_mac_address}
    bindkey: ${smartshunt500a_encryption_key}

#############################################
### VE.Direct — 3 x UART
#############################################

uart:
  # MPPT 100/20 VE.Direct
  - id: uart_vedirect1
    tx_pin: GPIO18    # NON CONNECTÉ
    rx_pin: GPIO19    # TX du MPPT100/20
    baud_rate: 19200
    rx_buffer_size: 256

  # MPPT 100/20_2 VE.Direct
  - id: uart_vedirect2
    tx_pin: GPIO17    # NON CONNECTÉ
    rx_pin: GPIO16   # TX du MPPT100/20_2
    baud_rate: 19200
    rx_buffer_size: 256

  # SmartShunt 500A VE.Direct
  - id: uart_shunt500a
    tx_pin: GPIO21      # NON CONNECTÉ
    rx_pin: GPIO22      # TX du SmartShunt
    baud_rate: 19200
    rx_buffer_size: 256

victron:
  - uart_id: uart_vedirect1
    id: mppt10020_vd
    throttle: 2s

  - uart_id: uart_vedirect2
    id: mppt10020_2_vd
    throttle: 2s

  - uart_id: uart_shunt500a
    id: smartshunt500a_vd
    throttle: 2s

globals:

  - id: mppt10020_max_battery_current_today
    type: float
    initial_value: '0.0'

  - id: mppt10020_2_max_battery_current_today
    type: float
    initial_value: '0.0'

  - id: mppt10020_max_power_yesterday
    type: float
    initial_value: '0.0'

  - id: mppt10020_2_max_power_yesterday
    type: float
    initial_value: '0.0'

  - id: mppt10020_max_pv_voltage_yesterday
    type: float
    initial_value: '0.0'

  - id: mppt10020_2_max_pv_voltage_yesterday
    type: float
    initial_value: '0.0'

  - id: venus_portal_id
    type: std::string
    initial_value: ""

  - id: battery_instance
    type: int
    initial_value: '-1'

  - id: mppt10020_instance
    type: int
    initial_value: '-1'

  - id: mppt10020_2_instance
    type: int
    initial_value: '-1'

  - id: battery_topic_w
    type: std::string
    initial_value: ""

  - id: mppt10020_topic_w
    type: std::string
    initial_value: ""

  - id: mppt10020_2_topic_w
    type: std::string
    initial_value: ""
  
  - id: shunt_topic_w
    type: std::string
    initial_value: ""

  - id: shunt_productid_sent
    type: bool
    initial_value: "false"  

  - id: mppt10020_productid_sent
    type: bool
    initial_value: "false"

  - id: mppt10020_2_productid_sent
    type: bool
    initial_value: "false"    

  # MPPT 100/20 timers
  - id: mppt10020_last_state
    type: int
    initial_value: '0'
  - id: mppt10020_last_ts
    type: uint32_t
    initial_value: '0'
  - id: mppt10020_time_bulk
    type: uint32_t
    initial_value: '0'
  - id: mppt10020_time_abs
    type: uint32_t
    initial_value: '0'
  - id: mppt10020_time_float
    type: uint32_t
    initial_value: '0'

  # MPPT 100/20_2 timers
  - id: mppt10020_2_last_state
    type: int
    initial_value: '0'
  - id: mppt10020_2_last_ts
    type: uint32_t
    initial_value: '0'
  - id: mppt10020_2_time_bulk
    type: uint32_t
    initial_value: '0'
  - id: mppt10020_2_time_abs
    type: uint32_t
    initial_value: '0'
  - id: mppt10020_2_time_float
