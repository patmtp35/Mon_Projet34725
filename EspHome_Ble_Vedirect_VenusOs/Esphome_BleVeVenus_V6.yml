#########################################################################################          
interval:

  # 🔋 Envoi des valeurs SmartShunt vers Venus
  - interval: 2s
    then:
      - if:
          condition:
            lambda: |-
              return !id(battery_topic_w).empty();
          then:
            - mqtt.publish:
                topic: device/victron_unified/Proxy
                payload: !lambda |-
                  DynamicJsonDocument doc(6144);
                  doc["topicPath"] = id(battery_topic_w);

                  JsonObject v = doc["values"].to<JsonObject>();

                  // Track min/max voltage today (GX history-like)
                  float vb = id(smartshunt500a_battery_voltage).state;
                  if (!isnan(vb)) {
                    if (vb < id(battery_min_voltage_today)) id(battery_min_voltage_today) = vb;
                    if (vb > id(battery_max_voltage_today)) id(battery_max_voltage_today) = vb;
                    v["Dc/0/Voltage"] = vb;   // ✅ important
                  }

                  float ib = id(smartshunt500a_battery_current).state;
                  if (!isnan(ib))
                    v["Dc/0/Current"] = ib;

                  // ✅ GX reference power: VE.Direct first (stable)
                  float pw = id(smartshunt500a_vd_power).state;
                  if (!isnan(pw))
                    v["Dc/0/Power"] = pw;
                  else {
                    float p2 = id(smartshunt500a_battery_power).state;
                    if (!isnan(p2)) v["Dc/0/Power"] = p2;
                  }

                  float soc = id(smartshunt500a_soc).state;
                  if (!isnan(soc))
                    v["Soc"] = soc;

                  // Consumed Ah (Victron native)
                  float cah = id(smartshunt500a_vd_consumed_ah).state;
                  if (!isnan(cah))
                    v["ConsumedAh"] = cah;

                  // Installed capacity (required)
                  v["InstalledCapacity"] = ${battery_installed_capacity_ah};

                  // Min/Max voltage today
                  if (id(battery_min_voltage_today) < 1000.0)
                    v["History/Daily/0/MinVoltage"] = id(battery_min_voltage_today);
                  if (id(battery_max_voltage_today) > 0.0)
                    v["History/Daily/0/MaxVoltage"] = id(battery_max_voltage_today);

                  // TimeToGo (minutes)
                  float ttg = id(smartshunt500a_vd_time_to_go).state;
                  if (!isnan(ttg) && ttg > 0)
                    v["TimeToGo"] = (int) ttg;

                  std::string out;
                  serializeJson(doc, out);
                  return out;
                qos: 0
                retain: false

  # ❤️ Keepalive GX (OBLIGATOIRE)
  - interval: 40s
    then:
      - if:
          condition:
            lambda: |-
              return !id(venus_portal_id).empty();
          then:
            - mqtt.publish:
                topic: !lambda |-
                  return std::string("R/") + id(venus_portal_id) + "/keepalive";
                payload: ""
                qos: 0
                retain: false

  # 🟢 STATUS — déclaration du SmartShunt (LA PIÈCE QUI MANQUAIT)
  - interval: 30s
    then:
      - mqtt.publish:
          topic: device/victron_unified/Status
          payload: |-
            {
              "clientId": "victron_unified",
              "connected": 1,
              "version": "6.2.0",
              "services": {
                "battery1": "battery"
              }
            }
          qos: 0
          retain: true

##################################################################################
# MPPT 100/20 → Venus OS (MR-MANUEL CLEAN)
##################################################################################
  - interval: 5s
    then:
      - mqtt.publish:
          topic: venus/solarcharger/mppt_100_20
          retain: true
          payload: !lambda |-

            DynamicJsonDocument doc(4096);

            float pwr = id(mppt10020_vd_panel_power).state;
            if (isnan(pwr))
              pwr = id(mppt10020_ble_panel_power).state;
            if (isnan(pwr)) pwr = 0;

            float pv_v = id(mppt10020_vd_panel_voltage).state;
            if (isnan(pv_v))
              pv_v = id(mppt10020_ble_panel_voltage).state;
            if (isnan(pv_v))
              pv_v = 0;

            // Track Max PV Voltage Today
            if (pv_v > 5 && pv_v > id(mppt10020_max_pv_voltage_today))
              id(mppt10020_max_pv_voltage_today) = pv_v;

            float bv = id(mppt10020_vd_battery_voltage).state;
            if (isnan(bv))
              bv = id(smartshunt500a_battery_voltage).state;

            float bi = id(mppt10020_vd_panel_current).state;
            if (isnan(bi)) bi = 0;

            int state = 1;
            if (!isnan(id(mppt10020_vd_charging_mode_id).state)) {
              int m = (int) id(mppt10020_vd_charging_mode_id).state;
              if (m >= 3 && m <= 7) state = m;
            }

            JsonObject pv = doc["Pv"].to<JsonObject>();
            pv["V"] = pv_v;

            JsonObject yield = doc["Yield"].to<JsonObject>();
            yield["Power"] = pwr;
            yield["System"] = id(mppt10020_yield_lifetime);

            JsonObject dc0 = doc["Dc"]["0"].to<JsonObject>();
            dc0["Voltage"] = bv;
            dc0["Current"] = bi;

            JsonObject hist0 = doc["History"]["Daily"]["0"].to<JsonObject>();
            JsonObject hist1 = doc["History"]["Daily"]["1"].to<JsonObject>();

            // ── Aujourd'hui ──
            float y = id(mppt10020_vd_yield_today).state;
            if (!isnan(y))
              hist0["Yield"] = y;
            else
              hist0["Yield"] = id(mppt10020_yield_today_wh) / 1000.0;

            float maxp = id(mppt10020_vd_max_power_today).state;
            if (!isnan(maxp))
              hist0["MaxPower"] = maxp;
            else
              hist0["MaxPower"] = id(mppt10020_max_power_today);

            hist0["MaxPvVoltage"]      = id(mppt10020_max_pv_voltage_today);
            hist0["MinBatteryVoltage"] = id(battery_min_voltage_today) < 1000.0f ? id(battery_min_voltage_today) : 0.0f;
            hist0["MaxBatteryVoltage"] = id(battery_max_voltage_today);
