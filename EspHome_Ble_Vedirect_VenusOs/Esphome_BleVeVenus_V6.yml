#################################################
# SmartShunt 500A – Unified templates (BLE + VE.Direct)
#################################################

  - platform: template
    name: "DEBUG smartshunt BLE current raw"
    unit_of_measurement: "A"
    update_interval: 5s
    lambda: |-
      return id(smartshunt500a_ble_battery_current).state;

  - platform: template
    name: "DEBUG smartshunt VE.Direct current raw"
    unit_of_measurement: "A"
    update_interval: 5s
    lambda: |-
      return id(smartshunt500a_vd_battery_current).state;

  - platform: template
    name: "smartshunt500a_battery_power"
    id: smartshunt500a_battery_power
    device_class: power
    accuracy_decimals: 2
    unit_of_measurement: "W"
    icon: "mdi:flash"
    update_interval: 5s
    lambda: |-

      // BLE prioritaire
      float p_ble = id(smartshunt500a_ble_battery_power).state;
      if (!isnan(p_ble))
        return roundf(p_ble * 100.0f) / 100.0f;

      // fallback VE.Direct
      float v = id(smartshunt500a_vd_battery_voltage).state;
      float i = id(smartshunt500a_vd_battery_current).state;

      if (!isnan(v) && !isnan(i)) {
        float p = v * i;
        return roundf(p * 100.0f) / 100.0f;
      }

      return NAN;
   
  - platform: template
    name: "smartshunt500a_consumed_ah"
    unit_of_measurement: "Ah"
    icon: "mdi:battery-minus"
    update_interval: 30s
    lambda: |-
      if (!isnan(id(smartshunt500a_vd_consumed_ah).state))
        return id(smartshunt500a_vd_consumed_ah).state;
      return NAN;
      
  - platform: template
    name: "smartshunt500a_battery_voltage"
    id: smartshunt500a_battery_voltage
    device_class: voltage
    accuracy_decimals: 2
    unit_of_measurement: "V"
    update_interval: 5s
    lambda: |-
      if (!isnan(id(smartshunt500a_ble_battery_voltage).state))
        return id(smartshunt500a_ble_battery_voltage).state;
      return id(smartshunt500a_vd_battery_voltage).state;

  - platform: template
    name: "smartshunt500a_battery_current"
    id: smartshunt500a_battery_current
    device_class: current
    accuracy_decimals: 2
    unit_of_measurement: "A"
    icon: "mdi:current-dc"
    update_interval: 5s
    lambda: |-
     float cur;

     // BLE prioritaire
     if (!isnan(id(smartshunt500a_ble_battery_current).state))
       cur = id(smartshunt500a_ble_battery_current).state;
     else
       cur = id(smartshunt500a_vd_battery_current).state;

     if (!isnan(cur)) {

       // track max battery current (GX history)
       if (fabs(cur) > id(mppt10020_max_battery_current_today))
         id(mppt10020_max_battery_current_today) = fabs(cur);

       if (fabs(cur) > id(mppt10020_2_max_battery_current_today))
         id(mppt10020_2_max_battery_current_today) = fabs(cur);

       return cur;
     }

     return 0 ;

  - platform: template
    name: "smartshunt500a_soc"
    id: smartshunt500a_soc
    device_class: battery
    unit_of_measurement: "%"
    update_interval: 5s
    icon: "mdi:battery-high"
    lambda: |-
      if (!isnan(id(smartshunt500a_ble_soc).state))
        return id(smartshunt500a_ble_soc).state;
      return id(smartshunt500a_vd_soc).state;

  #################################################
  # SMARTSOLAR 1 (MPPT10020) — BLE PRIORITAIRE
  #################################################

  - platform: template
    name: "smartsolar1_esp_battery_voltage"
    id: smartsolar1_esp_battery_voltage
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      float v_ble = id(mppt10020_ble_battery_voltage).state;
      float v_vd  = id(mppt10020_vd_battery_voltage).state;

      // BLE prioritaire si valeur réaliste (batterie 48V)
      if (!isnan(v_ble) && v_ble > 10.0)
        return v_ble;

      // fallback VE.Direct si réaliste
      if (!isnan(v_vd) && v_vd > 10.0)
        return v_vd;

      return NAN;

  - platform: template
    name: "smartsolar1_esp_panel_current"
